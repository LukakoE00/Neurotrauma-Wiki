<aside id="sidebar">

    {% assign category_pages = site.pages
        | where_exp: "p", "p.category"
        | sort: "order" %}

    {% for page in category_pages %}

        {% assign category_data = site.data.category_groups[page.category] %}

        <a class="sidebar-category"
           href="{{ page.url | relative_url }}">
            {{ category_data.label }}
        </a>

    {% endfor %}

</aside>
